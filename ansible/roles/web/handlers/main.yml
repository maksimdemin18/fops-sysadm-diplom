---
- name: restart nginx
  systemd:
    name: nginx
    state: restarted
    enabled: true

- name: restart node_exporter
  systemd:
    name: node_exporter
    state: restarted
    enabled: true
    daemon_reload: true

- name: restart nginxlog_exporter
  systemd:
    name: prometheus-nginxlog-exporter
    state: restarted
    enabled: true
    daemon_reload: true
