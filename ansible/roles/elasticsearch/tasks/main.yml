---
- name: Set vm.max_map_count for Elasticsearch
  ansible.posix.sysctl:
    name: vm.max_map_count
    value: '262144'
    state: present
    reload: true

- name: Download Elasticsearch deb package from Yandex mirror
  ansible.builtin.get_url:
    url: "{{ elasticsearch_deb_url }}"
    dest: "{{ elasticsearch_deb_path }}"
    mode: "0644"

- name: Wait until cloud-init is finished
  ansible.builtin.shell: |
    if command -v cloud-init >/dev/null 2>&1; then
      cloud-init status --wait
    else
      exit 0
    fi
  args:
    executable: /bin/bash
  changed_when: false

- name: Wait for apt/dpkg locks to be released
  ansible.builtin.shell: |
    while fuser /var/lib/dpkg/lock >/dev/null 2>&1        || fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1        || fuser /var/cache/apt/archives/lock >/dev/null 2>&1; do
      sleep 5
    done
  args:
    executable: /bin/bash
  changed_when: false

- name: Install Elasticsearch from downloaded deb
  ansible.builtin.apt:
    deb: "{{ elasticsearch_deb_path }}"
    state: present
    lock_timeout: 600
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Ensure Elasticsearch directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: elasticsearch
    group: elasticsearch
    mode: "0755"
  loop:
    - /var/lib/elasticsearch
    - /var/log/elasticsearch

- name: Deploy elasticsearch.yml
  ansible.builtin.template:
    src: elasticsearch.yml.j2
    dest: /etc/elasticsearch/elasticsearch.yml
    owner: root
    group: elasticsearch
    mode: "0660"
  notify: Restart elasticsearch

- name: Ensure elasticsearch service is enabled and started
  ansible.builtin.systemd:
    name: elasticsearch
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Elasticsearch API
  ansible.builtin.wait_for:
    port: 9200
    host: 127.0.0.1
    timeout: 300
